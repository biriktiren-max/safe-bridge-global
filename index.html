<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Bridge Global | V3.1 Operasyon Merkezi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    
    <style>
        body { background-color: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card-custom { background-color: #1e293b; border-radius: 10px; padding: 30px; width: 100%; max-width: 500px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3); }
        .form-control { background-color: #2d3748; color: white; border: none; margin-bottom: 15px; padding: 12px; }
        .form-control::placeholder { color: #a0aec0; }
        .form-control:focus { background-color: #2d3748; color: white; box-shadow: none; border: 1px solid #3182ce; }
        .btn-baslat { background-color: #047857; color: white; font-weight: bold; width: 100%; padding: 12px; }
        .btn-baslat:hover { background-color: #065f46; color: white; }
        .btn-teslim { background-color: #3182ce; color: white; font-weight: bold; width: 100%; padding: 12px; }
        .btn-teslim:hover { background-color: #2b6cb0; color: white; }
        .btn-iade { background-color: #e53e3e; color: white; font-weight: bold; width: 100%; padding: 12px; }
        .btn-iade:hover { background-color: #c53030; color: white; }
        hr { border-color: #4a5568; margin: 25px 0; }
    </style>
</head>
<body>

<div class="card-custom">
    <h4 class="text-center mb-4" style="font-weight: bold;">
        SAFE BRIDGE GLOBAL <br>
        <span style="font-size: 16px; color: #cbd5e1;">| V3.1 OPERASYON MERKEZİ</span>
    </h4>

    <h6 style="color: #10b981;">1. EMANET KASASINI KUR (Zaman Kilidi: 1 Dk)</h6>
    <input type="text" id="aliciAdres" class="form-control" placeholder="Alıcı Cüzdan Adresi (0x...)">
    <input type="text" id="miktar" class="form-control" placeholder="Miktar (Örn: 0.001)">
    <input type="text" id="kurulumSifre" class="form-control" placeholder="Bir Güvenlik Şifresi Belirle">
    <button id="baslatBtn" class="btn btn-baslat">KASAYI KİLİTLE</button>

    <hr>

    <h6 style="color: #3b82f6;">2. KASAYI ALICIYA AÇ (Mutlu Son)</h6>
    <input type="number" id="islemIdInput1" class="form-control" placeholder="İşlem ID Numarası">
    <input type="text" id="teslimSifre" class="form-control" placeholder="Şifreyi Girin">
    <button id="teslimEtBtn" class="btn btn-teslim">EMANETİ TESLİM ET</button>

    <hr>

    <h6 style="color: #fc8181;">3. SÜRE DOLDU - İADE AL (Tersine Mühendislik)</h6>
    <input type="number" id="iadeIdInput" class="form-control" placeholder="İşlem ID Numarası">
    <button id="iadeBtn" class="btn btn-iade">İŞLEMİ İPTAL ET VE İADE AL</button>
</div>

<script>
    const contractAddress = "0x60dE16566F972D9fBb77f96397c14392E1C30b1f"; 
    const contractABI = [
        "function createEscrow(address _receiver, string _passwordHash, uint256 _duration, address _tokenAddress, uint256 _amount) payable",
        "function completeEscrow(uint256 _escrowId, string _password)",
        "function refundEscrow(uint256 _escrowId)",
        "function escrowCounter() view returns (uint256)"
    ];

    // 1. KASAYI KİLİTLE
    document.getElementById("baslatBtn").addEventListener("click", async () => {
        try {
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            const signer = provider.getSigner();
            const contract = new ethers.Contract(contractAddress, contractABI, signer);

            const alici = document.getElementById("aliciAdres").value;
            const miktar = document.getElementById("miktar").value;
            const sifre = document.getElementById("kurulumSifre").value;
            
            if (!alici || !miktar || !sifre) return alert("Eksik bilgi!");

            const amountInWei = ethers.utils.parseEther(miktar);
            const duration = 60; // DİKKAT: Test için zaman kilidi 60 saniye yapıldı!
            const nullAddress = "0x0000000000000000000000000000000000000000"; 

            const tx = await contract.createEscrow(alici, sifre, duration, nullAddress, amountInWei, { value: amountInWei });
            alert("Yakıt ateşlendi! Onaylayın ve bekleyin...");
            await tx.wait();
            alert("İşlem Başarılı! Kasa kilitlendi. İade testi için 1 Dakika beklemelisiniz.");
        } catch (error) {
            console.error(error);
            alert("Hata oluştu!");
        }
    });

    // 2. TESLİMAT
    document.getElementById("teslimEtBtn").addEventListener("click", async () => {
        try {
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            const signer = provider.getSigner();
            const contract = new ethers.Contract(contractAddress, contractABI, signer);
            
            const islemId = document.getElementById("islemIdInput1").value;
            const sifre = document.getElementById("teslimSifre").value;
            
            const tx = await contract.completeEscrow(islemId, sifre); 
            alert("Onaylanıyor...");
            await tx.wait();
            alert("Kasa açıldı, emanet teslim edildi.");
        } catch (error) {
            console.error(error);
            alert("Hata!");
        }
    });

    // 3. İADE ALMA (YENİ MODÜL)
    document.getElementById("iadeBtn").addEventListener("click", async () => {
        try {
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            const signer = provider.getSigner();
            const contract = new ethers.Contract(contractAddress, contractABI, signer);
            
            const islemId = document.getElementById("iadeIdInput").value;
            if (!islemId) return alert("Lütfen İşlem ID girin!");

            const tx = await contract.refundEscrow(islemId); 
            alert("İade komutu gönderildi! MetaMask üzerinden onaylayın...");
            await tx.wait();
            alert("BÜYÜK BAŞARI! Süre doldu, işlem iptal edildi ve paranız cüzdanınıza (Account 1) iade edildi.");
        } catch (error) {
            console.error(error);
            alert("İade Başarısız! Bunun 2 sebebi olabilir:\n1. 60 saniyelik zaman kilidi henüz dolmamıştır.\n2. Bu ID zaten teslim edilmiş veya iade alınmıştır.");
        }
    });
</script>

</body>
</html>
